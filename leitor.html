<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Presença — Colégio Antônio Costa</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a6641">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="config.js" defer></script>
    <script src="Notifications.js" defer></script>
    <script src="leitor.js" defer></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js").catch(() => {});
            });
        }
    </script>
</head>
<body>

<header class="header">
    <div class="header-left">
        <img src="logo.png" class="logo">

        <div class="header-text">
            <span class="header-title">Colégio Estadual Desembargador</span>
            <span class="header-sub">Antônio F. F. da Costa — Icaraíma / PR</span>
        </div>
    </div>

    <nav class="header-nav">
        <a href="index.html" class="ativo">Cadastro</a>
        <a href="leitor.html">Leitor</a>
    </nav>
</header>

<div class="container fade-in">

    <div class="page-header">
        <h1 class="page-title">Controle de Presença</h1>
        <p class="page-sub" id="dataHoje"></p>
    </div>

    <!-- TURNO BANNER -->
    <div class="turno-banner" id="turnoBanner">
        <span class="turno-banner-txt" id="turnoTxt">Verificando turno...</span>
        <span class="horario-chip" id="relogioChip"></span>
    </div>

    <!-- STATS -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Presentes no turno</div>
            <div class="stat-value" id="totalPresentes">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Última entrada</div>
            <div class="stat-value pequeno" id="ultimaEntrada">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Turno atual</div>
            <div class="stat-value pequeno" id="turnoAtualStat">—</div>
        </div>
    </div>

    <div class="leitor-grid">

        <!-- SCANNER -->
        <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
            <div class="card-title" style="align-self:flex-start;">📷 Scanner</div>
            <div id="reader"></div>
            <div class="scanner-status" id="scannerStatus">
                Clique no botão para ativar a câmera
            </div>
            <button class="btn btn-primary" id="btnIniciar" onclick="iniciarCamera()">
                📸 Ativar câmera
            </button>
            <button class="btn btn-secondary btn-sm" onclick="gerarRelatorioPresencas()">📄 Exportar presenças</button>
        </div>

        <!-- PRESENÇAS -->
        <div class="card" style="padding:1.4rem;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
                <div class="card-title" style="margin:0;">
                    <span class="live-dot"></span> Chegadas do turno
                </div>
                <button class="btn btn-secondary btn-sm" onclick="carregarPresencas()">↺ Atualizar</button>
            </div>
            <div class="presencas-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Turma</th>
                            <th>Horário</th>
                        </tr>
                    </thead>
                    <tbody id="listaPresencas">
                        <tr><td colspan="3">
                            <div class="empty">
                                <div class="empty-icon">📋</div>
                                <p>Nenhuma presença ainda.</p>
                            </div>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- MODAL PRESENÇA -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="fecharModal(event)">
    <div class="modal-card">
        <div class="modal-icon" id="modalIcon"></div>
        <p class="modal-nome" id="modalNome"></p>
        <p class="modal-info" id="modalInfo"></p>
        <span class="modal-badge" id="modalBadge"></span>
        <br>
        <button class="modal-fechar" onclick="document.getElementById('modalOverlay').style.display='none'">
            Fechar
        </button>
    </div>
</div>

</body>
</html>
