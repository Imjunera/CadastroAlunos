<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Colégio Antônio Costa</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js" defer></script>
    <script src="app-init.js" defer></script>
    <script src="transitions.js" defer></script>
    <script src="monitor.js" defer></script>
    <script src="dev-panel.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="config.js" defer></script>
    <script src="Notifications.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="main.js" defer></script>
</head>
<body>

<header class="header">
    <div class="header-left">
        <img src="logo.png" class="logo" alt="Logo Colégio Antônio Costa">
        <div class="header-text">
            <span class="header-title">Colégio Estadual Desembargador</span>
            <span class="header-sub">Antônio F. F. da Costa — Icaraíma / PR</span>
        </div>
    </div>
    <nav class="header-nav">
        <a href="index.html" class="ativo">Cadastro</a>
        <a href="leitor.html">Leitor</a>
        <a href="historico.html">Histórico</a>
        <a href="analise.html">Análise</a>
    </nav>
</header>

<div class="container fade-in">

    <div class="page-header">
        <h1 class="page-title">Alunos</h1>
        <p class="page-sub">Gerencie os alunos cadastrados na escola.</p>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total de alunos</div>
            <div class="stat-value" id="totalAlunos">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Presentes hoje</div>
            <div class="stat-value" id="presentesHoje">—</div>
        </div>
    </div>

    <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-title">✏️ <span id="tituloForm">Novo aluno</span></div>
        <div class="form-grid">
            <div class="form-group">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" placeholder="Ex: Lucas Oliveira" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="idade">Idade</label>
                <input type="number" id="idade" placeholder="Ex: 16" min="1" max="99">
            </div>
            <div class="form-group">
                <label for="turma">Turma</label>
                <select id="turma">
                    <option value="">Selecione a turma</option>
                    <optgroup label="6ª - 9ª Série">
                        <option value="6A">6º A</option>
                        <option value="6B">6º B</option>
                        <option value="6C">6º C</option>
                        <option value="6D">6º D</option>
                        <option value="7A">7º A</option>
                        <option value="7B">7º B</option>
                        <option value="7C">7º C</option>
                        <option value="7D">7º D</option>
                        <option value="8A">8º A</option>
                        <option value="8B">8º B</option>
                        <option value="8C">8º C</option>
                        <option value="8D">8º D</option>
                        <option value="9A">9º A</option>
                        <option value="9B">9º B</option>
                        <option value="9C">9º C</option>
                        <option value="9D">9º D</option>
                    </optgroup>
                    <optgroup label="Técnico de Sistemas">
                        <option value="1_TEC_SISTEMAS">1º Técnico de Sistemas</option>
                        <option value="2_TEC_SISTEMAS">2º Técnico de Sistemas</option>
                        <option value="3_TEC_SISTEMAS">3º Técnico de Sistemas</option>
                    </optgroup>
                    <optgroup label="Técnico Agronegócio">
                        <option value="1_TEC_AGRO">1º Técnico Agronegócio</option>
                        <option value="2_TEC_AGRO">2º Técnico Agronegócio</option>
                        <option value="3_TEC_AGRO">3º Técnico Agronegócio</option>
                    </optgroup>
                    <optgroup label="EMP">
                        <option value="1_EMP">1º EMP</option>
                        <option value="2_EMP">2º EMP</option>
                        <option value="3_EMP">3º EMP</option>
                    </optgroup>
                    <optgroup label="NEM">
                        <option value="1_NEM">1º NEM</option>
                        <option value="2_NEM">2º NEM</option>
                        <option value="3_NEM">3º NEM</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label for="turno">Turno</label>
                <select id="turno">
                    <option value="">Selecione</option>
                    <option value="Manhã">Manhã — 06:45 às 13:00</option>
                    <option value="Tarde">Tarde — 13:00 às 18:00</option>
                    <option value="Noite">Noite — 19:00 às 00:00</option>
                </select>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" id="btnSalvar" onclick="cadastrar()">✅ Salvar aluno</button>
            <button class="btn btn-secondary" onclick="limparCampos()">✕ Cancelar</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="busca" placeholder="Buscar por nome..." oninput="listar()">
        </div>
        <div class="toolbar-actions">
            <button class="btn btn-success btn-sm" onclick="gerarRelatorioPresencas()">📄 Relatório</button>
            <button class="btn btn-danger btn-sm" onclick="confirmarApagarTodos()">🗑️ Apagar todos</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Turma</th>
                    <th>Turno</th>
                    <th>QR Code</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <tr><td colspan="6">
                    <div class="empty"><div class="empty-icon">⏳</div><p>Carregando...</p></div>
                </td></tr>
            </tbody>
        </table>
    </div>

</div>
<script>
        // Chamada central do AppInit — uma vez por página
        document.addEventListener("DOMContentLoaded", () => {
            if (window.AppInit) {
                AppInit.inicializar(["dom", "notif", "auth", "supabase"]);
            }
        });
    </script>
</body>
</html>
